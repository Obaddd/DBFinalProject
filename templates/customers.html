{% extends 'base.html' %}
{% block content %}
<div class="row g-4">
    <div class="col-lg-4">
        <div class="card card-soft">
            <div class="card-body">
                <h2 class="h5">Add Customer</h2>
                <form method="post" action="{{ url_for('add_customer') }}">
                    <div class="mb-3"><label class="form-label">Name</label><input name="name" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Email</label><input name="email" type="email" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Phone</label><input name="phone" class="form-control" required></div>
                    <button class="btn btn-dark w-100">Add Customer</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-lg-8">
        <div class="card card-soft">
            <div class="card-body">
                <h2 class="h5">Customers</h2>
                <div class="table-responsive">
                    <table class="table table-striped align-middle">
                        <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Actions</th></tr></thead>
                        <tbody>
                            {% for customer in customers %}
                            <tr>
                                <td>{{ customer.customer_id }}</td>
                                <td>{{ customer.name }}</td>
                                <td>{{ customer.email }}</td>
                                <td>{{ customer.phone }}</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#editCustomer{{ customer.customer_id }}">Edit</button>
                                    <form method="post" action="{{ url_for('delete_customer', customer_id=customer.customer_id) }}" class="d-inline">
                                        <button class="btn btn-sm btn-outline-danger">Delete</button>
                                    </form>
                                </td>
                            </tr>

                            <div class="modal fade" id="editCustomer{{ customer.customer_id }}" tabindex="-1">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header"><h5 class="modal-title">Edit Customer</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                                        <form method="post" action="{{ url_for('edit_customer', customer_id=customer.customer_id) }}">
                                            <div class="modal-body">
                                                <div class="mb-3"><label class="form-label">Name</label><input name="name" class="form-control" value="{{ customer.name }}" required></div>
                                                <div class="mb-3"><label class="form-label">Email</label><input name="email" type="email" class="form-control" value="{{ customer.email }}" required></div>
                                                <div class="mb-3"><label class="form-label">Phone</label><input name="phone" class="form-control" value="{{ customer.phone }}" required></div>
                                            </div>
                                            <div class="modal-footer"><button class="btn btn-primary">Save changes</button></div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                            {% else %}
                            <tr><td colspan="5" class="text-center">No customers found.</td></tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
