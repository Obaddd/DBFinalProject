{% extends 'base.html' %}
{% block content %}
<div class="row g-4">
    <div class="col-lg-4">
        <div class="card card-soft">
            <div class="card-body">
                <h2 class="h5">Add Table</h2>
                <form method="post" action="{{ url_for('add_table') }}">
                    <div class="mb-3"><label class="form-label">Capacity</label><input name="capacity" type="number" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Table Type</label><input name="table_type" class="form-control" placeholder="Indoor / Patio / Booth" required></div>
                    <button class="btn btn-dark w-100">Add Table</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-lg-8">
        <div class="card card-soft">
            <div class="card-body">
                <h2 class="h5">Tables</h2>
                <div class="table-responsive">
                    <table class="table table-striped align-middle">
                        <thead><tr><th>ID</th><th>Capacity</th><th>Type</th><th>Actions</th></tr></thead>
                        <tbody>
                            {% for table in tables %}
                            <tr>
                                <td>{{ table.table_id }}</td>
                                <td>{{ table.capacity }}</td>
                                <td>{{ table.table_type }}</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#editTable{{ table.table_id }}">Edit</button>
                                    <form method="post" action="{{ url_for('delete_table', table_id=table.table_id) }}" class="d-inline">
                                        <button class="btn btn-sm btn-outline-danger">Delete</button>
                                    </form>
                                </td>
                            </tr>
                            <div class="modal fade" id="editTable{{ table.table_id }}" tabindex="-1">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header"><h5 class="modal-title">Edit Table</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                                        <form method="post" action="{{ url_for('edit_table', table_id=table.table_id) }}">
                                            <div class="modal-body">
                                                <div class="mb-3"><label class="form-label">Capacity</label><input name="capacity" type="number" class="form-control" value="{{ table.capacity }}" required></div>
                                                <div class="mb-3"><label class="form-label">Table Type</label><input name="table_type" class="form-control" value="{{ table.table_type }}" required></div>
                                            </div>
                                            <div class="modal-footer"><button class="btn btn-primary">Save changes</button></div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                            {% else %}
                            <tr><td colspan="4" class="text-center">No tables found.</td></tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
